name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Application Syntax
        run: |
          python -m py_compile app.py

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/path \
          ghcr.io/gitleaks/gitleaks:latest detect \
          --source="/path" \
          --verbose

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'

      - name: Build Docker Image
        run: |
          docker build -t secure-devsecops-app .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-devsecops-app'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
        continue-on-error: true 
      
      - name: Deploy to EC2

        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            cd /home/ubuntu/secure-devsecops-pipeline

            sudo docker stop $(sudo docker ps -q) || true

            sudo docker rm $(sudo docker ps -aq) || true

            sudo docker build -t secure-devsecops-app .

            sudo docker run -d -p 5001:5001 secure-devsecops-app
